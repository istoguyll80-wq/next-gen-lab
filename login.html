<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Log In — Phishing Awareness Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Navbar -->
    <header>
      <a class="brand" href="index.html" aria-label="Back to home">
        <div class="logo" aria-hidden="true">⛨</div>
        <div>
          <div class="brand-name">PhishGuard</div>
          <div class="brand-sub">Awareness Simulator</div>
        </div>
      </a>
      <nav>
        <a href="index.html">Home</a>
        <a href="choose_quiz.html">Simulator</a>
        <a href="register.html" class="btn secondary" style="padding:7px 16px">Register</a>
      </nav>
    </header>
  </div>

  <div class="auth-wrap">
    <section class="auth-card" aria-labelledby="login-title">
      <!-- Header -->
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:40px;margin-bottom:10px">🔐</div>
        <h1 id="login-title">Secure Login</h1>
        <p>Access your simulator account to track your training progress.</p>
      </div>

      <!-- Divider with label -->
      <div style="background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.1);border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px">
        <span style="font-size:18px">🛡️</span>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em">Training Environment</div>
          <div class="muted">Use your simulator credentials below</div>
        </div>
      </div>

      <form id="loginForm" class="auth-form" novalidate>
        <div>
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@example.com" />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button class="btn primary" type="submit" style="width:100%;justify-content:center;padding:14px">
          🔓 Log In to Dashboard
        </button>
      </form>

      <div id="message" class="auth-msg" aria-live="polite"></div>

      <div class="auth-row" style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(0,212,255,0.08)">
        <a class="link" href="register.html">No account? Register free</a>
        <a class="link" href="index.html">← Back to home</a>
      </div>
    </section>
  </div>

  <script src="auth.js"></script>
  <script src="chat_widget.js"></script>
  <script>setupLoginForm();</script>
</body>
</html>
