<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Steam/Discord Phishing Simulator — PhishGuard</title>
    <link rel="stylesheet" href="quiz.css">
    <style>
        :root {
            --steam-bg: #101821;
            --steam-panel: #16202b;
            --steam-panel-2: #1b2838;
            --steam-line: rgba(199, 213, 224, 0.12);
            --steam-text: #c7d5e0;
            --steam-muted: #8f98a0;
            --steam-blue: #66c0f4;
            --steam-blue-deep: #2a475e;
            --steam-green: #5c7e10;
            --steam-red: #b13f3f;
        }

        body {
            background:
                linear-gradient(180deg, rgba(42, 71, 94, 0.35), rgba(16, 24, 33, 0.95)),
                var(--steam-bg);
        }

        .steam-app {
            max-width: 1040px;
            border: 1px solid var(--steam-line);
            background: linear-gradient(180deg, rgba(27, 40, 56, 0.95), rgba(12, 18, 25, 0.95));
        }

        .steam-title-row {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .steam-logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #66c0f4, #2a475e);
            color: #08111a;
            font-weight: 800;
            letter-spacing: 0;
        }

        .steam-layout {
            display: grid;
            grid-template-columns: 310px minmax(0, 1fr);
            gap: 16px;
        }

        .steam-sidebar {
            background: linear-gradient(180deg, #17212d, #0d141c);
            border: 1px solid var(--steam-line);
            border-radius: 8px;
            overflow: hidden;
            min-height: 520px;
        }

        .steam-sidebar-title {
            padding: 13px 14px;
            background: linear-gradient(90deg, #22384b, #182432);
            color: var(--steam-blue);
            font-size: 13px;
            font-weight: 700;
            border-bottom: 1px solid var(--steam-line);
            text-transform: uppercase;
        }

        .steam-contact-list {
            display: grid;
            max-height: 576px;
            overflow: auto;
        }

        .steam-contact {
            appearance: none;
            background: transparent;
            border: 0;
            border-bottom: 1px solid rgba(199, 213, 224, 0.07);
            color: var(--steam-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 70px;
            padding: 10px 12px;
            text-align: left;
            transition: background 0.15s ease, box-shadow 0.15s ease;
        }

        .steam-contact:hover {
            background: rgba(102, 192, 244, 0.08);
        }

        .steam-contact.active {
            background: linear-gradient(90deg, rgba(102, 192, 244, 0.22), rgba(102, 192, 244, 0.06));
            box-shadow: inset 3px 0 0 var(--steam-blue);
        }

        .steam-contact-avatar {
            width: 42px;
            height: 42px;
            border-radius: 5px;
            display: grid;
            align-items: end;
            justify-items: end;
            padding: 4px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            color: #ffffff;
            font-size: 10px;
            font-weight: 800;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(102, 192, 244, 0.45);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
            flex: 0 0 auto;
        }

        .steam-contact-avatar::before,
        .steam-avatar::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.38), transparent 0 16%, transparent 17%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent 48%);
        }

        .steam-contact-avatar::after,
        .steam-avatar::after {
            content: "";
            position: absolute;
            right: 4px;
            bottom: 4px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8bc53f;
            border: 1px solid #0d141c;
            box-shadow: 0 0 8px rgba(139, 197, 63, 0.7);
        }

        .steam-contact-avatar.has-image::before,
        .steam-avatar.has-image::before {
            display: none;
        }

        .pfp-operator { background: linear-gradient(135deg, #25384d 0%, #66c0f4 52%, #16202b 100%); }
        .pfp-neon { background: radial-gradient(circle at 72% 28%, #b6ff4a 0 14%, transparent 15%), linear-gradient(135deg, #2a475e, #101821 62%, #66c0f4); }
        .pfp-crimson { background: radial-gradient(circle at 30% 30%, #ff7968 0 18%, transparent 19%), linear-gradient(135deg, #4d1f27, #b13f3f 56%, #1b2838); }
        .pfp-gold { background: radial-gradient(circle at 68% 34%, #f6d365 0 17%, transparent 18%), linear-gradient(135deg, #5c4410, #9b7b20 48%, #17212d); }
        .pfp-violet { background: radial-gradient(circle at 34% 35%, #d8b4fe 0 16%, transparent 17%), linear-gradient(135deg, #29234c, #674ea7 55%, #101821); }
        .pfp-green { background: radial-gradient(circle at 65% 28%, #b5f36d 0 15%, transparent 16%), linear-gradient(135deg, #243d1a, #5c7e10 55%, #17212d); }
        .pfp-cyan { background: radial-gradient(circle at 32% 32%, #9fe8ff 0 17%, transparent 18%), linear-gradient(135deg, #0b3d4a, #1387a8 52%, #101821); }
        .pfp-steel { background: radial-gradient(circle at 68% 30%, #c7d5e0 0 14%, transparent 15%), linear-gradient(135deg, #3b4b5b, #1b2838 55%, #0d141c); }
        .pfp-ember { background: radial-gradient(circle at 35% 34%, #ffb86b 0 17%, transparent 18%), linear-gradient(135deg, #572c16, #c2682e 48%, #17212d); }
        .pfp-ice { background: radial-gradient(circle at 70% 30%, #d9f5ff 0 16%, transparent 17%), linear-gradient(135deg, #244c63, #6db3d8 50%, #101821); }

        .steam-contact-avatar.has-image,
        .steam-avatar.has-image {
            background-position: center;
            background-size: cover;
            color: transparent;
            text-shadow: none;
        }

        .steam-contact-main {
            min-width: 0;
            flex: 1;
        }

        .steam-contact-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 3px;
        }

        .steam-contact-name {
            color: #ffffff;
            font-size: 13px;
            font-weight: 800;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .steam-contact-time {
            color: var(--steam-muted);
            font-size: 11px;
            white-space: nowrap;
        }

        .steam-contact-preview {
            color: var(--steam-muted);
            font-size: 12px;
            line-height: 1.25;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .steam-contact-state {
            font-size: 11px;
            margin-top: 4px;
        }

        .steam-contact-state.unread {
            color: var(--steam-muted);
        }

        .steam-contact-state.revealed {
            color: var(--steam-blue);
        }

        .steam-contact-state.correct {
            color: #90ba3c;
        }

        .steam-contact-state.wrong {
            color: #ff6b6b;
        }

        .steam-window {
            background: var(--steam-panel);
            border: 1px solid var(--steam-line);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
            min-height: 520px;
            display: flex;
            flex-direction: column;
        }

        .steam-window-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 16px;
            background: linear-gradient(90deg, #1b2838, #22384b);
            border-bottom: 1px solid var(--steam-line);
        }

        .steam-window-user {
            color: #ffffff;
            font-weight: 800;
            margin-bottom: 2px;
        }

        .steam-source {
            color: var(--steam-blue);
            font-weight: 700;
        }

        .steam-time {
            color: var(--steam-muted);
            font-size: 13px;
            white-space: nowrap;
        }

        .steam-chat-scroll {
            flex: 1;
            background:
                linear-gradient(180deg, rgba(8, 17, 26, 0.35), rgba(8, 17, 26, 0.75)),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.015) 0, rgba(255, 255, 255, 0.015) 1px, transparent 1px, transparent 36px);
            padding: 20px;
        }

        .steam-message {
            display: grid;
            grid-template-columns: 52px minmax(0, 1fr);
            gap: 14px;
            max-width: 760px;
            margin-right: auto;
        }

        .steam-avatar {
            width: 52px;
            height: 52px;
            border-radius: 6px;
            display: grid;
            align-items: end;
            justify-items: end;
            padding: 5px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            color: #ffffff;
            font-size: 12px;
            font-weight: 800;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
            border: 2px solid rgba(102, 192, 244, 0.42);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.09);
        }

        .steam-message-head {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .steam-username {
            color: #ffffff;
            font-weight: 800;
        }

        .steam-status {
            color: #90ba3c;
            font-size: 12px;
        }

        .steam-incoming-label {
            color: var(--steam-muted);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .steam-body {
            position: relative;
            background: linear-gradient(180deg, #243447, #172534);
            border: 1px solid rgba(102, 192, 244, 0.2);
            border-radius: 4px;
            color: var(--steam-text);
            line-height: 1.55;
            padding: 16px;
            overflow-wrap: anywhere;
            white-space: pre-wrap;
        }

        .steam-body::before {
            content: "";
            position: absolute;
            top: 14px;
            left: -8px;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-right: 8px solid #243447;
        }

        .steam-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            padding: 16px 20px 20px;
            border-top: 1px solid var(--steam-line);
            background: rgba(12, 18, 25, 0.62);
        }

        .steam-actions .progress {
            min-width: 180px;
        }

        .btn.steam-safe {
            background: linear-gradient(90deg, #6a9f19, #9abf40);
            color: #07111a;
            border-color: transparent;
        }

        .btn.steam-phish {
            background: linear-gradient(90deg, #b13f3f, #e45b5b);
            color: #120707;
            border-color: transparent;
        }

        .btn.steam-neutral {
            background: linear-gradient(90deg, #2a475e, #3c617d);
            color: #dcebf5;
            border-color: rgba(102, 192, 244, 0.14);
        }

        .btn.answer-selected {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.16), 0 0 18px rgba(102, 192, 244, 0.15);
        }

        .btn.answer-correct {
            background: linear-gradient(90deg, #6a9f19, #9abf40);
            color: #07111a;
        }

        .btn.answer-wrong {
            background: linear-gradient(90deg, #9f2f2f, #ff6b6b);
            color: #180606;
        }

        .answer-pill {
            display: inline-flex;
            align-items: center;
            padding: 5px 9px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0;
            background: rgba(102, 192, 244, 0.12);
            color: var(--steam-blue);
        }

        .summary-list {
            display: grid;
            gap: 10px;
            margin-top: 14px;
        }

        .summary-item {
            border: 1px solid var(--steam-line);
            border-radius: 8px;
            padding: 12px;
            background: rgba(8, 17, 26, 0.42);
        }

        .summary-item strong {
            color: #ffffff;
        }

        .summary-item small {
            display: block;
            margin-top: 5px;
            color: var(--steam-muted);
        }

        @media (max-width: 760px) {
            .steam-layout {
                grid-template-columns: 1fr;
            }

            .steam-sidebar {
                min-height: auto;
            }

            .steam-contact-list {
                max-height: 260px;
            }

            .steam-message {
                grid-template-columns: 44px minmax(0, 1fr);
            }

            .steam-avatar {
                width: 44px;
                height: 44px;
            }

            .steam-actions {
                padding: 16px;
            }

            .steam-actions .progress {
                order: 5;
                width: 100%;
                flex-basis: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="app steam-app" role="application" aria-label="Steam phishing quiz">
        <header>
            <div class="steam-title-row">
                <div class="steam-logo" aria-hidden="true">ST</div>
                <div>
                    <h1>Steam Phishing Quiz</h1>
                    <div class="meta">Review each Steam-style message and decide whether it is safe or phishing.</div>
                </div>
            </div>
            <div style="margin-left:auto" class="meta" id="scoreMeta">Score: 0 / 10</div>
        </header>

        <main>
            <nav aria-label="Quiz navigation" style="margin-bottom:12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                <a href="index.html" class="btn steam-neutral" id="backHome" role="link" style="text-decoration:none">Back to Home</a>
                <a href="choose_quiz.html" id="chooseQuiz" class="btn steam-neutral" role="link" style="margin-left:auto; text-decoration:none">Choose Quiz</a>
            </nav>

            <section class="steam-layout" aria-live="polite">
                <aside class="steam-sidebar" aria-label="Incoming Steam messages">
                    <div class="steam-sidebar-title">Incoming Messages</div>
                    <div class="steam-contact-list" id="steamContactList"></div>
                </aside>

                <section class="steam-window">
                    <div class="steam-window-bar">
                        <div>
                            <div class="steam-window-user" id="username">Steam Support</div>
                            <div class="steam-source" id="source">Steam Chat</div>
                            <div class="meta" id="qIndex">1 / 10</div>
                        </div>
                        <div class="steam-time" id="time">Today</div>
                    </div>

                    <div class="steam-chat-scroll">
                        <article class="steam-message">
                            <div class="steam-avatar" id="avatar">SS</div>
                            <div>
                                <div class="steam-message-head">
                                    <span class="steam-username" id="messageUsername">Steam Support</span>
                                    <span class="steam-status">incoming</span>
                                </div>
                                <div class="steam-incoming-label">New message received</div>
                                <div class="steam-body" id="messageBody">Message content will appear here.</div>
                            </div>
                        </article>
                    </div>

                    <div class="steam-actions">
                        <button class="btn steam-safe" id="btnSafe">Safe</button>
                        <button class="btn steam-phish" id="btnPhish">Phishing</button>
                        <button class="btn steam-neutral" id="revealAnswer">Reveal Answer</button>
                        <div class="progress" aria-label="Quiz progress">
                            <i id="progressBar" style="width:0%"></i>
                        </div>
                    </div>
                </section>
            </section>

            <section class="card" id="feedbackCard">
                <div id="feedback" class="result hidden" role="status"></div>
            </section>

            <section class="card" id="controlsCard">
                <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                    <button class="btn steam-neutral" id="prevBtn" disabled>Previous</button>
                    <button class="btn primary" id="nextBtn">Next</button>
                    <button class="btn steam-neutral" id="restartBtn">Restart</button>
                    <div style="margin-left:auto" class="meta" id="answerState">Unanswered</div>
                </div>
            </section>

            <section class="card hidden" id="summaryCard" aria-live="polite">
                <h3>Final Score</h3>
                <div id="summaryText" class="meta"></div>
                <div class="summary-list" id="summaryList"></div>
                <div style="margin-top:14px">
                    <button class="btn primary" id="summaryRestartBtn">Restart Quiz</button>
                </div>
            </section>
        </main>
    </div>

    <script src="steam_quiz.js"></script>
    <script src="chat_widget.js"></script>
</body>
</html>
